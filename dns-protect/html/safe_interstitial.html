<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DNS Protect - Safe Mode</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body class="dark">
  <header>
    <img src="../images/icon-32.png" alt="Logo">
    <div>
      <h1>DNS Protect - Safe Mode</h1>
      <p id="statusLabel">Review before continuing</p>
    </div>
  </header>

  <section class="interstitial card">
    <h2 class="title">Check this site before proceeding</h2>
    <p class="hint" id="targetLabel"></p>

    <div class="button-grid primary-actions">
      <button id="allowBtn" class="btn primary">Continue</button>
      <button id="scanBtn" class="btn ghost">Send scan</button>
      <button id="denyBtn" class="btn subtle">Go back</button>
    </div>

    <div class="button-grid secondary-actions">
      <button id="whitelistBtn" class="btn success">Whitelist</button>
      <button id="blacklistBtn" class="btn danger">Blacklist</button>
    </div>
  </section>

  <script src="../scripts_/safe_interstitial.js"></script>
</body>
</html>
