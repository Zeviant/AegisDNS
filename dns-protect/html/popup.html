<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DNS Protect by NicoV and Zeviant</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body class="popup">
  <header>
    <img src="../images/icon-32.png" alt="Logo">
    <div>
      <h1>DNS Protect</h1>
      <p id="statusLabel">Disconnected</p>
    </div>
  </header>
  <section id="modePanel">
    <p class="subtitle">Select mode</p>
    <div class="mode-list">
      <button data-mode="none" class="mode">None</button>
      <button data-mode="logging" class="mode">Logging</button>
      <button data-mode="silent" class="mode">Silent</button>
      <button data-mode="safe" class="mode">Safe</button>
    </div>
    <p class="hint">MODE_ERROR.</p>
  </section>

  <script src="../scripts_/popup.js"></script>
</body>
</html>
