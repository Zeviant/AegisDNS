# Default configuration for DNS Level Connection Interception, Analysis, and Maliciousness Scoring System

# Packet capture settings
capture_timeout: 300  # seconds (5 minutes)
max_packets: 10000

# Scoring configuration
scoring:
  enable_pattern_matching: true
  enable_entropy_analysis: true
  suspicious_threshold: 0.7
  whitelist_enabled: true

# Data handling
data:
  data_directory: "data"
  enable_csv_export: true
  enable_reports: true
  auto_backup: true
  retention_days: 30

# Logging configuration
logging:
  level: "INFO"
  file: "logs/dns_analyzer.log"
  max_size_mb: 10
  backup_count: 5
  console_output: true

# Network settings
network:
  dns_port: 53
  capture_filter: "udp port 53"
  promiscuous_mode: false
  buffer_size: 65536

# Analysis settings
analysis:
  enable_real_time: true
  batch_size: 100
  alert_threshold: 0.8
  generate_alerts: true

# Output formats
output:
  json_enabled: true
  csv_enabled: true
  report_enabled: true
  dashboard_enabled: false